name: Release

on:
  push:
    # Trigger the workflow only when a tag starting with 'v' is pushed (e.g., v1.0.0)
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

# We need write permissions to create a release and upload assets
permissions:
  contents: write

jobs:
  check-version:
    name: Verify Tag Matches Cargo.toml
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check version match
        run: |
          # Extract the version string from Cargo.toml using grep and sed
          CARGO_VERSION=$(grep -m 1 '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          
          # Remove the 'v' prefix from the GitHub tag name (e.g., 'v1.0.0' becomes '1.0.0')
          TAG_VERSION=${GITHUB_REF_NAME#v}
          
          echo "Cargo version: $CARGO_VERSION"
          echo "Tag version:   $TAG_VERSION"
          
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch! Tag ($TAG_VERSION) does not match Cargo.toml ($CARGO_VERSION)."
            exit 1 # This fails the pipeline early
          fi
          echo "Versions match. Proceeding to build."

  build-and-release:
    name: Build and Release
    needs: check-version # This prevents the build from starting if the version check fails
    runs-on: ${{ matrix.os }}
    strategy:
      # Matrix allows us to run the exact same steps on different operating systems simultaneously
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: tictactoe
            asset_name: tictactoe-linux-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: tictactoe.exe
            asset_name: tictactoe-windows-amd64.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Release Binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename Artifact (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: mv target/${{ matrix.target }}/release/${{ matrix.artifact_name }} ${{ matrix.asset_name }}

      # Windows uses PowerShell by default in Actions, so we use Rename-Item
      - name: Rename Artifact (Windows)
        if: matrix.os == 'windows-latest'
        run: Rename-Item -Path target\${{ matrix.target }}\release\${{ matrix.artifact_name }} -NewName ${{ matrix.asset_name }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
          generate_release_notes: true
