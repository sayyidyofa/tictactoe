name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: write

jobs:
  check-version:
    name: Verify Tag Matches Cargo.toml
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check version match
        shell: bash
        run: |
          CARGO_VERSION=$(grep -m 1 '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          echo "Cargo version: $CARGO_VERSION"
          echo "Tag version:   $TAG_VERSION"

          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch! Tag ($TAG_VERSION) does not match Cargo.toml ($CARGO_VERSION)."
            exit 1
          fi

          echo "Versions match. Proceeding to build."

  build:
    name: Build (${{ matrix.os }})
    needs: check-version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: tictactoe
            asset_name: tictactoe-linux-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: tictactoe.exe
            asset_name: tictactoe-windows-amd64.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare asset (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" "dist/${{ matrix.asset_name }}"
          ls -lah dist

      - name: Prepare asset (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\${{ matrix.artifact_name }}" "dist\${{ matrix.asset_name }}"
          Get-ChildItem dist

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Show downloaded files
        shell: bash
        run: |
          echo "Downloaded artifacts:"
          find dist -maxdepth 3 -type f -print

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/tictactoe-linux-amd64/tictactoe-linux-amd64
            dist/tictactoe-windows-amd64.exe/tictactoe-windows-amd64.exe
          generate_release_notes: true